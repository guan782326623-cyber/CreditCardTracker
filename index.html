// ── Helpers ────────────────────────────────────────────────────────
const getDefaultUsage = (benefits) => {
    const d = {};
    benefits.forEach(b => { d[b.id] = { usedAmount: 0, checkedMonths: [], checkedPeriods: [], completed: false }; });
    return d;
};

const calcRecouped = (benefits, usage) => {
    let total = 0;
    benefits.forEach(b => {
        const u = usage[b.id] || {};
        if      (b.type === 'annual')        total += u.usedAmount || 0;
        else if (b.type === 'monthly')       total += (u.checkedMonths?.length || 0) * (b.monthlyValue || 0);
        else if (b.type === 'monthly_uber')  total += (u.checkedMonths || []).reduce((a, m) => a + (b.monthlyValues?.[m] || 0), 0);
        else if (b.type === 'semi-annual')   total += (u.checkedPeriods?.length || 0) * (b.totalValue / 2);
        else if (b.type === 'quarterly')     total += (u.checkedPeriods?.length || 0) * (b.totalValue / 4);
        else if (b.type === 'toggle')        total += u.completed ? b.totalValue : 0;
    });
    return total;
};

    // Load users on mount
    useEffect(() => {
        fetch(`${API}/users`)
            .then(r => r.json())
            .then(data => {
                setUsers(data);
                if (data.length > 0) setSelectedUser(data[0]);
                else setLoading(false);
            });
    }, []);

    // Load custom cards on mount and merge into CARDS
    useEffect(() => {
        fetch(`${API}/custom-cards`)
            .then(r => r.json())
            .then(cards => {
                cards.forEach(c => { CARDS[c.id] = c; });
                setCustomCardIds(cards.map(c => c.id));
            })
            .catch(() => {});
    }, []);

    // Load user's cards when selected user changes
    useEffect(() => {
        if (!selectedUser) return;
        fetch(`${API}/users/${selectedUser.id}/cards`)
            .then(r => r.json())
            .then(cards => {
                setUserCards(cards);
                // pick first card or keep current if still in list
                setSelectedCardId(prev =>
                    cards.includes(prev) ? prev : (cards[0] || null)
                );
            });
    }, [selectedUser?.id]);

    // Load usage when user, card, year, or reload tick changes
    useEffect(() => {
        if (!selectedUser || !selectedCardId) {
            if (selectedUser && userCards.length === 0) setLoading(false);
            return;
        }
        // Show loading spinner only when user/card/year actually changes
        const key = `${selectedUser.id}|${selectedCardId}|${selectedYear}`;
        const contentChanged = key !== prevLoadKey.current;
        prevLoadKey.current = key;

        isInit.current = false;
        if (contentChanged) {
            setLoading(true);
            setExpandedId(null);
        }
        const card = CARDS[selectedCardId];
        fetch(`${API}/usage/${selectedUser.id}/${selectedCardId}?year=${selectedYear}`)
            .then(r => r.json())
            .then(data => {
                setUsage({ ...getDefaultUsage(card.benefits), ...data });
                setLoading(false);
                isInit.current = true;
            })
            .catch(() => {
                setUsage(getDefaultUsage(card.benefits));
                setLoading(false);
                isInit.current = true;
            });
    }, [selectedUser?.id, selectedCardId, selectedYear, usageReloadTick]);

    // Auto-save on every usage change
    useEffect(() => {
        if (!isInit.current || !selectedUser || !selectedCardId) return;
        setSaveStatus('saving');
        clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(() => {
            fetch(`${API}/usage/${selectedUser.id}/${selectedCardId}?year=${selectedYear}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(usage),
            })
            .then(r => r.ok ? setSaveStatus('saved') : setSaveStatus('error'))
            .catch(() => setSaveStatus('error'));
        }, 400);
    }, [usage]);

    // Focus inputs when opened
    useEffect(() => {
        if (addingUser && addUserRef.current) addUserRef.current.focus();
    }, [addingUser]);

    useEffect(() => {
        if (editingUserId && editUserRef.current) editUserRef.current.focus();
    }, [editingUserId]);

    useEffect(() => {
        if (showAddCard && addCardRef.current) addCardRef.current.focus();
    }, [showAddCard]);

    // Close add-card dropdown on outside click
    useEffect(() => {
        if (!showAddCard) return;
        const handler = (e) => {
            if (addCardRef.current && !addCardRef.current.closest('[data-addcard]')?.contains(e.target)) {
                setShowAddCard(false);
            }
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
    }, [showAddCard]);

    // ── User management ────────────────────────────────────────────
    const confirmAddUser = () => {
        const name = newUserName.trim();
        if (!name) return;
        fetch(`${API}/users`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name }),
        })
        .then(r => r.json())
        .then(newUser => {
            if (newUser.error) { alert(t.userAlreadyExists); return; }
            setUsers(prev => [...prev, newUser]);
            setSelectedUser(newUser);
            setAddingUser(false);
            setNewUserName('');
        });
    };

    const deleteUser = (user) => {
        if (users.length === 1) { alert(t.keepOneUser); return; }
        if (!confirm(t.confirmDeleteUser(user.name))) return;
        fetch(`${API}/users/${user.id}`, { method: 'DELETE' }).then(() => {
            const remaining = users.filter(u => u.id !== user.id);
            setUsers(remaining);
            if (selectedUser?.id === user.id) setSelectedUser(remaining[0]);
        });
    };

    const startEditUser = (user, e) => {
        e.stopPropagation();
        setEditingUserId(user.id);
        setEditUserName(user.name);
    };

    const confirmEditUser = () => {
        const name = editUserName.trim();
        if (!name) { setEditingUserId(null); return; }
        fetch(`${API}/users/${editingUserId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name }),
        })
        .then(r => r.json())
        .then(updated => {
            if (updated.error) { alert(t.userAlreadyExists); return; }
            setUsers(prev => prev.map(u => u.id === editingUserId ? { ...u, name } : u));
            if (selectedUser?.id === editingUserId) setSelectedUser(prev => ({ ...prev, name }));
            setEditingUserId(null);
        });
    };

    // ── Card management ────────────────────────────────────────────
    const addCardForUser = (cardId) => {
        fetch(`${API}/users/${selectedUser.id}/cards`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ card_id: cardId }),
        }).then(() => {
            setUserCards(prev => [...prev, cardId]);
            setSelectedCardId(cardId);
            setShowAddCard(false);
        });
    };

    const removeCardForUser = (cardId) => {
        if (userCards.length === 1) return; // keep at least one
        fetch(`${API}/users/${selectedUser.id}/cards/${cardId}`, { method: 'DELETE' })
            .then(() => {
                const remaining = userCards.filter(c => c !== cardId);
                setUserCards(remaining);
                if (selectedCardId === cardId) setSelectedCardId(remaining[0] || null);
            });
    };

    // ── Statement upload (supports multiple files) ─────────────────
    const handleFileChange = async (e) => {
        const files = Array.from(e.target.files);
        e.target.value = '';
        if (!files.length) return;
        setScanning(true);
        setScanProgress({ done: 0, total: files.length });
        const results = [];
        for (const file of files) {
            const form = new FormData();
            form.append('file', file);
            try {
                const data = await fetch(`${API}/scan-statement`, { method: 'POST', body: form }).then(r => r.json());
                data._filename = file.name;
                results.push(data);
            } catch {
                results.push({ _filename: file.name, error: t.scanError });
            }
            setScanProgress(p => ({ ...p, done: p.done + 1 }));
        }
        setScanning(false);
        setScanResults(results);
        // Switch UI to first matched result
        const first = results.find(r => r.user && r.applied?.length > 0);
        if (first) {
            const mu = users.find(u => u.id === first.user.id);
            if (mu) {
                setSelectedUser(mu);
                if (first.card_id && CARDS[first.card_id]) setSelectedCardId(first.card_id);
            }
        }
    };

    // ── Create new user from scan result and apply its benefits ────
    const createUserAndApply = async (idx) => {
        const result = scanResults[idx];
        const name = result.cardholder || '未知用户';
        try {
            const newUser = await fetch(`${API}/users`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name }),
            }).then(r => r.json());
            if (newUser.error) { alert(newUser.error); return; }
            const applyRes = await fetch(`${API}/apply-benefits`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id:    newUser.id,
                    card_id:    result.card_id,
                    detected:   result.detected,
                    stmt_month: result.stmt_month,
                    stmt_year:  result.stmt_year,
                }),
            }).then(r => r.json());
            setUsers(prev => [...prev, newUser]);
            setScanResults(prev => prev.map((r, i) =>
                i === idx ? { ...r, user: newUser, applied: applyRes.applied } : r
            ));
        } catch (err) {
            console.error('createUserAndApply error:', err);
        }
    };

    // ── Bind account last4 to card type ───────────────────────────
    const bindAccountCard = async (idx) => {
        const result = scanResults[idx];
        const cardId = bindSelections[idx];
        if (!cardId || !result.last4) return;
        await fetch(`${API}/account-cards`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ last4: result.last4, card_id: cardId }),
        });
        // Update result in-place to show bound card
        setScanResults(prev => prev.map((r, i) =>
            i === idx ? { ...r, error: t.bindSuccess, card_id: cardId } : r
        ));
    };

    // ── Custom card: scrape URL ────────────────────────────────────
    const handleScrapeCard = async () => {
        const url = scrapeUrl.trim();
        if (!url) return;
        setScrapeUrlError('');
        setAddCardStep('scraping');
        try {
            const data = await fetch(`${API}/scrape-card`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url }),
            }).then(r => r.json());
            if (data.error) { setScrapeUrlError(data.error); setAddCardStep('url'); return; }
            setCardDraft(data);
            setAddCardStep('editing');
        } catch {
            setScrapeUrlError(t.scrapeError);
            setAddCardStep('url');
        }
    };

    // ── Custom card: save confirmed draft ─────────────────────────
    const handleSaveCard = async () => {
        if (!cardDraft?.id) return;
        // Ensure resetPeriod is set for all benefits
        const finalCard = {
            ...cardDraft,
            benefits: cardDraft.benefits.map(b => ({
                ...b,
                resetPeriod: b.resetPeriod || { zh: '每年', en: 'Annual' },
                description: b.description || { zh: '', en: '' },
            })),
        };
        await fetch(`${API}/custom-cards`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(finalCard),
        });
        CARDS[finalCard.id] = finalCard;
        setCustomCardIds(prev => prev.includes(finalCard.id) ? prev : [...prev, finalCard.id]);
        setAddCardStep('closed');
        setScrapeUrl('');
        setCardDraft(null);
        // Auto-add to current user if one is selected
        if (selectedUser) {
            fetch(`${API}/users/${selectedUser.id}/cards`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ card_id: finalCard.id }),
            }).then(() => {
                setUserCards(prev => prev.includes(finalCard.id) ? prev : [...prev, finalCard.id]);
                setSelectedCardId(finalCard.id);
            });
        }
    };

    // ── Usage handlers ─────────────────────────────────────────────
    const card = selectedCardId ? CARDS[selectedCardId] : null;

    const handleSlider = (id, value) => {
        const b = card.benefits.find(b => b.id === id);
        setUsage(prev => ({ ...prev, [id]: { ...prev[id], usedAmount: Math.min(Math.max(0, value), b.totalValue) } }));
    };
    const toggleMonth = (id, idx) => {
        setUsage(prev => {
            const cur  = prev[id]?.checkedMonths || [];
            const next = cur.includes(idx) ? cur.filter(m => m !== idx) : [...cur, idx];
            return { ...prev, [id]: { ...prev[id], checkedMonths: next } };
        });
    };
    const togglePeriod = (id, period) => {
        setUsage(prev => {
            const cur  = prev[id]?.checkedPeriods || [];
            const next = cur.includes(period) ? cur.filter(p => p !== period) : [...cur, period];
            return { ...prev, [id]: { ...prev[id], checkedPeriods: next } };
        });
    };
    const toggleComplete = (id) => {
        setUsage(prev => ({ ...prev, [id]: { ...prev[id], completed: !prev[id]?.completed } }));
    };
    const resetData = () => {
        if (!confirm(t.confirmReset(selectedUser?.name, cardName(card)))) return;
        fetch(`${API}/reset/${selectedUser.id}/${selectedCardId}?year=${selectedYear}`, { method: 'POST' })
            .then(() => {
                isInit.current = false;
                setUsage(getDefaultUsage(card.benefits));
                setTimeout(() => { isInit.current = true; }, 0);
                setSaveStatus('saved');
            });
    };

    // ── Scan modal close: refresh data if any benefits were applied ─
    const handleScanClose = () => {
        const results = scanResults;
        setScanResults(null);
        setBindSelections({});
        if (results?.some(r => r.applied?.some(a => a.was_new))) {
            const first = results.find(r => r.applied?.some(a => a.was_new));
            if (first?.user) {
                const mu = users.find(u => u.id === first.user.id);
                if (mu) {
                    setSelectedUser(mu);
                    if (first.card_id && CARDS[first.card_id]) setSelectedCardId(first.card_id);
                    setSelectedYear(first.stmt_year || selectedYear);
                }
            }
            setUsageReloadTick(t => t + 1);
        }
    };

    // ── Save badge ─────────────────────────────────────────────────
    const SaveBadge = () => {
        if (saveStatus === 'idle')   return null;
        if (saveStatus === 'saving') return <span className="text-xs text-white/50 flex items-center gap-1"><Icon name="loader" size={11} className="spin"/> {t.saving}</span>;
        if (saveStatus === 'saved')  return <span className="text-xs text-emerald-300 flex items-center gap-1"><Icon name="check-circle" size={11}/> {t.saved}</span>;
        if (saveStatus === 'error')  return <span className="text-xs text-red-300 flex items-center gap-1"><Icon name="x-circle" size={11}/> {t.saveFailed}</span>;
        return null;
    };

    // ── No users → first-run screen ────────────────────────────────
    if (!loading && users.length === 0) {
        return (
            <div className="flex items-center justify-center min-h-screen bg-slate-100">
                <div className="bg-white rounded-2xl p-8 shadow-lg max-w-xs w-full mx-4 text-center">
                    <Icon name="user" size={36} className="mx-auto mb-4 text-slate-300"/>
                    <h2 className="text-lg font-bold mb-1">{t.welcome}</h2>
                    <p className="text-slate-400 text-sm mb-5">{t.createUserPrompt}</p>
                    <input
                        ref={addUserRef}
                        type="text" placeholder={t.usernamePlaceholder}
                        value={newUserName}
                        onChange={e => setNewUserName(e.target.value)}
                        onKeyDown={e => e.key === 'Enter' && confirmAddUser()}
                        className="w-full border border-slate-200 rounded-lg px-4 py-2 mb-3 text-sm focus:outline-none focus:border-blue-400"
                    />
                    <button onClick={confirmAddUser}
                        className="w-full bg-slate-900 text-white rounded-lg py-2.5 font-medium text-sm hover:bg-slate-700 transition-colors">
                        {t.create}
                    </button>
                    <button onClick={toggleLang}
                        className="mt-4 text-xs text-slate-400 hover:text-slate-600 flex items-center gap-1 mx-auto">
                        <Icon name="globe" size={12}/> {lang === 'zh' ? 'English' : '中文'}
                    </button>
                </div>
            </div>
        );
    }

    // ── Loading ────────────────────────────────────────────────────
    if (loading) {
        return (
            <div className="flex items-center justify-center min-h-screen">
                <div className="text-center text-slate-400">
                    <Icon name="loader" size={30} className="mx-auto mb-3 spin"/>
                    <p className="text-sm">{t.loading}</p>
                </div>
            </div>
        );
    }

    const totalRecouped = card ? calcRecouped(card.benefits, usage) : 0;
    const effectiveFee  = card ? card.annualFee - totalRecouped : 0;
    const allCardIds           = [...ALL_CARD_IDS, ...customCardIds];
    const availableCardsToAdd  = allCardIds.filter(cid => !userCards.includes(cid));

    // ── Main UI ────────────────────────────────────────────────────
    return (
        <div className="max-w-3xl mx-auto px-4 pt-4 pb-28 fade-in">

            {/* ── App Header ──────────────────────────────────────── */}
            <div className="flex items-center gap-3 mb-5">
                <AppLogo size={40}/>
                <div>
                    <h1 className="text-xl font-bold text-slate-800 leading-tight">{t.appTitle}</h1>
                    <p className="text-xs text-slate-400 leading-tight">
                        {lang === 'zh' ? '多卡福利追踪与管理' : 'Multi-card benefits tracker'}
                    </p>
                </div>
            </div>

            {/* ── Top bar: user selector + lang toggle ─────────────── */}
            <div className="flex items-start gap-2 mb-3 flex-wrap">
                <div className="flex items-center gap-2 flex-wrap flex-1">
                    <Icon name="user" size={13} className="text-slate-400 flex-shrink-0 mt-2"/>
                    {users.map(user => (
                        <div key={user.id}>
                            {editingUserId === user.id ? (
                                /* ── Inline edit mode ── */
                                <div className="flex items-center gap-1">
                                    <input
                                        ref={editUserRef}
                                        type="text"
                                        value={editUserName}
                                        onChange={e => setEditUserName(e.target.value)}
                                        onKeyDown={e => {
                                            if (e.key === 'Enter') confirmEditUser();
                                            if (e.key === 'Escape') setEditingUserId(null);
                                        }}
                                        className="border border-blue-400 rounded-full px-3 py-1 text-sm w-24 focus:outline-none"
                                    />
                                    <button onClick={confirmEditUser}
                                        className="bg-slate-800 text-white rounded-full w-6 h-6 text-xs hover:bg-slate-700 flex items-center justify-center">✓</button>
                                    <button onClick={() => setEditingUserId(null)}
                                        className="text-slate-400 text-sm hover:text-slate-600">✕</button>
                                </div>
                            ) : (
                                /* ── Normal pill ── */
                                <div className={`flex items-center gap-1 rounded-full text-sm font-medium transition-all cursor-pointer select-none ${
                                    selectedUser?.id === user.id
                                        ? 'bg-slate-800 text-white pl-3 pr-1.5 py-1.5 shadow-sm'
                                        : 'bg-white text-slate-600 border border-slate-200 hover:border-slate-400 pl-3 pr-1.5 py-1.5'
                                }`}>
                                    <span onClick={() => setSelectedUser(user)}>{user.name}</span>
                                    {/* pencil edit */}
                                    <button onClick={(e) => startEditUser(user, e)}
                                        className={`rounded-full p-0.5 transition-colors ${
                                            selectedUser?.id === user.id ? 'text-white/40 hover:text-white' : 'text-slate-300 hover:text-slate-500'
                                        }`}>
                                        <Icon name="pencil" size={10}/>
                                    </button>
                                    {/* delete */}
                                    <button onClick={(e) => { e.stopPropagation(); deleteUser(user); }}
                                        className={`rounded-full p-0.5 transition-colors ${
                                            selectedUser?.id === user.id ? 'text-white/40 hover:text-red-300' : 'text-slate-300 hover:text-red-400'
                                        }`}>
                                        <Icon name="x" size={11}/>
                                    </button>
                                </div>
                            )}
                        </div>
                    ))}
                    {addingUser ? (
                        <div className="flex items-center gap-1.5">
                            <input
                                ref={addUserRef}
                                type="text" placeholder={t.usernamePlaceholder}
                                value={newUserName}
                                onChange={e => setNewUserName(e.target.value)}
                                onKeyDown={e => {
                                    if (e.key === 'Enter') confirmAddUser();
                                    if (e.key === 'Escape') { setAddingUser(false); setNewUserName(''); }
                                }}
                                className="border border-slate-300 rounded-full px-3 py-1 text-sm w-24 focus:outline-none focus:border-blue-400"
                            />
                            <button onClick={confirmAddUser}
                                className="bg-slate-800 text-white rounded-full w-6 h-6 text-xs hover:bg-slate-700 flex items-center justify-center">✓</button>
                            <button onClick={() => { setAddingUser(false); setNewUserName(''); }}
                                className="text-slate-400 text-sm hover:text-slate-600">✕</button>
                        </div>
                    ) : (
                        <button onClick={() => setAddingUser(true)}
                            className="flex items-center gap-1 px-3 py-1.5 rounded-full text-xs text-slate-400 border border-dashed border-slate-300 hover:border-slate-500 hover:text-slate-600 transition-colors">
                            <Icon name="user-plus" size={12}/> {t.addUser}
                        </button>
                    )}
                </div>
                {/* Language toggle */}
                <button onClick={toggleLang}
                    className="flex items-center gap-1 px-3 py-1.5 rounded-full text-xs bg-white border border-slate-200 text-slate-500 hover:border-slate-400 hover:text-slate-700 transition-colors flex-shrink-0 mt-0.5">
                    <Icon name="globe" size={12}/> {lang === 'zh' ? 'EN' : '中文'}
                </button>
            </div>

            {/* ── Card tabs + add card ────────────────────────────── */}
            <div className="flex gap-2 mb-4 items-center">
                {/* scrollable tabs */}
                <div className="flex gap-2 overflow-x-auto pb-1 items-center flex-1">
                {userCards.map(cid => (
                    <div key={cid} className="relative flex-shrink-0">
                        <button onClick={() => setSelectedCardId(cid)}
                            className={`px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all pr-8 ${
                                selectedCardId === cid
                                    ? 'bg-slate-800 text-white shadow-sm'
                                    : 'bg-white text-slate-500 border border-slate-200 hover:border-slate-400'
                            }`}>
                            {cardName(CARDS[cid])}
                        </button>
                        {/* remove card × */}
                        {userCards.length > 1 && (
                            <button onClick={() => removeCardForUser(cid)}
                                title={t.removeCard}
                                className={`absolute right-2 top-1/2 -translate-y-1/2 rounded-full p-0.5 transition-colors ${
                                    selectedCardId === cid ? 'text-white/40 hover:text-red-300' : 'text-slate-300 hover:text-red-400'
                                }`}>
                                <Icon name="x" size={11}/>
                            </button>
                        )}
                    </div>
                ))}
                </div>
                {/* Add card dropdown — outside overflow-x-auto so it isn't clipped */}
                <div className="relative flex-shrink-0" data-addcard="1">
                    <button onClick={() => setShowAddCard(prev => !prev)}
                        className="flex items-center gap-1 px-3 py-2 rounded-xl text-xs text-slate-400 border border-dashed border-slate-300 hover:border-slate-500 hover:text-slate-600 transition-colors whitespace-nowrap">
                        <Icon name="plus" size={12}/> {t.addCard}
                    </button>
                    {showAddCard && (
                        <div ref={addCardRef} data-addcard="1"
                            className="absolute top-full right-0 mt-1 bg-white border border-slate-200 rounded-xl shadow-lg z-20 overflow-hidden min-w-max">
                            {availableCardsToAdd.map(cid => (
                                <button key={cid} onClick={() => addCardForUser(cid)}
                                    className="block w-full text-left px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 transition-colors">
                                    {cardName(CARDS[cid])}
                                </button>
                            ))}
                            <div className="border-t border-slate-100"/>
                            <button onClick={() => { setShowAddCard(false); setScrapeUrl(''); setScrapeUrlError(''); setAddCardStep('url'); }}
                                className="flex items-center gap-2 w-full text-left px-4 py-2.5 text-sm text-blue-600 hover:bg-blue-50 transition-colors font-medium">
                                <Icon name="link" size={13}/> {t.addCustomCard}
                            </button>
                        </div>
                    )}
                </div>
            </div>

            {/* ── No card selected ───────────────────────────────── */}
            {!card && (
                <div className="bg-white rounded-2xl p-10 text-center text-slate-400 shadow-sm">
                    <Icon name="credit-card" size={36} className="mx-auto mb-3 text-slate-200"/>
                    <p className="text-sm">{t.noCards}</p>
                </div>
            )}

            {/* ── Header card ────────────────────────────────────── */}
            {card && (
                <>
                <div className={`${card.headerBg} rounded-2xl p-6 text-white shadow-xl mb-5 relative overflow-hidden`}>
                    <div className="absolute top-0 right-0 w-40 h-40 bg-white/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"/>
                    <div className="flex justify-between items-start mb-5 relative z-10">
                        <div>
                            <h1 className="text-xl font-bold flex items-center gap-2">
                                <Icon name="credit-card" size={20}/> {cardName(card)}
                            </h1>
                            <p className="text-white/50 text-xs mt-1 flex items-center gap-2">
                            <span>{selectedUser?.name} · {t.annualFee} ${card.annualFee}</span>
                            <span className="flex items-center gap-1 bg-white/10 rounded-lg px-2 py-0.5">
                                <button onClick={() => setSelectedYear(y => y - 1)} className="hover:text-white transition-colors px-0.5">‹</button>
                                <span className="font-semibold text-white/80 tabular-nums">{selectedYear}</span>
                                <button onClick={() => setSelectedYear(y => y + 1)} className="hover:text-white transition-colors px-0.5">›</button>
                            </span>
                        </p>
                        </div>
                        <SaveBadge/>
                    </div>
                    <div className="grid grid-cols-2 gap-4 relative z-10">
                        <div className="bg-white/10 rounded-xl p-4 border border-white/10">
                            <div className="text-xs text-white/50 mb-1">{t.recouped}</div>
                            <div className="text-3xl font-bold text-emerald-300">${totalRecouped.toFixed(0)}</div>
                        </div>
                        <div className="bg-white/10 rounded-xl p-4 border border-white/10">
                            <div className="text-xs text-white/50 mb-1">{t.effective}</div>
                            <div className={`text-3xl font-bold ${effectiveFee <= 0 ? 'text-blue-300' : 'text-orange-300'}`}>
                                ${effectiveFee.toFixed(0)}
                            </div>
                        </div>
                    </div>
                </div>

                {/* ── Benefits list ───────────────────────────────── */}
                <div className="space-y-3">
                    {card.benefits.map(benefit => {
                        const u          = usage[benefit.id] || {};
                        const isExpanded = expandedId === benefit.id;
                        const isComplete = benefit.type === 'toggle'    ? u.completed :
                                           benefit.type === 'annual'    ? (u.usedAmount || 0) >= benefit.totalValue :
                                           benefit.type === 'semi-annual' ? (u.checkedPeriods?.length || 0) >= 2 :
                                           benefit.type === 'quarterly'  ? (u.checkedPeriods?.length || 0) >= 4 : false;

                        let progress = '';
                        if (benefit.type === 'annual')        progress = `$${u.usedAmount || 0}`;
                        else if (benefit.type === 'monthly' || benefit.type === 'monthly_uber') progress = `${u.checkedMonths?.length || 0}/12`;
                        else if (benefit.type === 'semi-annual') progress = `${u.checkedPeriods?.length || 0}/2`;
                        else if (benefit.type === 'quarterly')   progress = `${u.checkedPeriods?.length || 0}/4`;
                        else if (benefit.type === 'toggle')   progress = u.completed
                            ? (lang === 'zh' ? '已完成' : 'Done')
                            : (lang === 'zh' ? '未完成' : 'Pending');

                        return (
                            <div key={benefit.id} className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-md transition-shadow">
                                <div className="p-4 flex items-center justify-between cursor-pointer select-none"
                                    onClick={() => setExpandedId(isExpanded ? null : benefit.id)}>
                                    <div className="flex items-center gap-3">
                                        <div className={`p-2.5 rounded-lg ${isComplete ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-500'}`}>
                                            <Icon name={benefit.type === 'monthly' || benefit.type === 'monthly_uber' || benefit.type === 'quarterly' ? 'calendar' : 'dollar-sign'} size={16}/>
                                        </div>
                                        <div>
                                            <h3 className="font-semibold text-slate-800 text-sm">{benefit.name[lang]}</h3>
                                            <p className="text-xs text-slate-400 mt-0.5">{benefit.resetPeriod[lang]} · {t.total} ${benefit.totalValue}</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <span className={`text-xs font-medium hidden sm:block ${isComplete ? 'text-emerald-500' : 'text-slate-400'}`}>{progress}</span>
                                        <Icon name={isExpanded ? 'chevron-up' : 'chevron-down'} size={16} className="text-slate-300"/>
                                    </div>
                                </div>

                                {isExpanded && (
                                    <div className="bg-slate-50 border-t border-slate-100 p-4 space-y-3">

                                        {/* Annual slider */}
                                        {benefit.type === 'annual' && (
                                            <div className="flex items-center gap-3 bg-white p-3 rounded-lg border border-slate-200">
                                                <input type="range" min="0" max={benefit.totalValue}
                                                    value={u.usedAmount || 0}
                                                    onChange={e => handleSlider(benefit.id, parseInt(e.target.value))}
                                                    className="flex-1 h-2 rounded-lg appearance-none cursor-pointer accent-blue-500"
                                                />
                                                <span className="font-mono font-bold text-slate-700 w-14 text-right">${u.usedAmount || 0}</span>
                                            </div>
                                        )}

                                        {/* Toggle */}
                                        {benefit.type === 'toggle' && (
                                            <button onClick={() => toggleComplete(benefit.id)}
                                                className={`w-full py-3 rounded-lg border font-medium text-sm transition-all ${
                                                    u.completed
                                                    ? 'bg-emerald-50 border-emerald-200 text-emerald-700'
                                                    : 'bg-white border-slate-200 hover:bg-slate-50 text-slate-600'
                                                }`}>
                                                {u.completed ? t.toggleDone(benefit.totalValue) : t.toggleNotDone}
                                            </button>
                                        )}

                                        {/* Monthly */}
                                        {(benefit.type === 'monthly' || benefit.type === 'monthly_uber') && (
                                            <div className="grid grid-cols-6 gap-1.5">
                                                {Array.from({ length: 12 }).map((_, idx) => {
                                                    const checked = u.checkedMonths?.includes(idx);
                                                    return (
                                                        <button key={idx} onClick={() => toggleMonth(benefit.id, idx)}
                                                            className={`py-2 rounded border text-center transition-all ${
                                                                checked
                                                                ? 'bg-emerald-500 border-emerald-600 text-white'
                                                                : 'bg-white border-slate-200 text-slate-400 hover:border-blue-300'
                                                            }`}>
                                                            <div className="text-xs font-medium">{t.monthLabel(idx + 1)}</div>
                                                            {benefit.type === 'monthly_uber' && (
                                                                <div className="text-[10px] opacity-80">${benefit.monthlyValues[idx]}</div>
                                                            )}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        )}

                                        {/* Quarterly */}
                                        {benefit.type === 'quarterly' && (
                                            <div className="grid grid-cols-4 gap-2">
                                                {[1, 2, 3, 4].map(q => {
                                                    const checked = u.checkedPeriods?.includes(q);
                                                    const label = [t.q1, t.q2, t.q3, t.q4][q - 1];
                                                    return (
                                                        <button key={q} onClick={() => togglePeriod(benefit.id, q)}
                                                            className={`py-3 rounded-lg border text-xs font-medium transition-all ${
                                                                checked
                                                                ? 'bg-emerald-50 border-emerald-200 text-emerald-700'
                                                                : 'bg-white border-slate-200 hover:bg-slate-50 text-slate-600'
                                                            }`}>
                                                            {label}{checked && ' ✓'}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        )}

                                        {/* Semi-annual */}
                                        {benefit.type === 'semi-annual' && (
                                            <div className="flex gap-3">
                                                {[1, 2].map(period => {
                                                    const checked = u.checkedPeriods?.includes(period);
                                                    return (
                                                        <button key={period} onClick={() => togglePeriod(benefit.id, period)}
                                                            className={`flex-1 py-3 rounded-lg border text-sm font-medium transition-all ${
                                                                checked
                                                                ? 'bg-emerald-50 border-emerald-200 text-emerald-700'
                                                                : 'bg-white border-slate-200 hover:bg-slate-50 text-slate-600'
                                                            }`}>
                                                            {period === 1 ? t.firstHalf : t.secondHalf}
                                                            {checked && ' ✓'}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        )}

                                        <p className="text-xs text-slate-400 flex items-center gap-1.5">
                                            <Icon name="info" size={11}/> {benefit.description[lang]}
                                        </p>
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
                </>
            )}

            {/* ── Bottom bar ──────────────────────────────────────── */}
            <div className="fixed bottom-0 left-0 right-0 bg-white/95 border-t border-slate-200 p-4 shadow-lg backdrop-blur-md">
                <div className="max-w-3xl mx-auto flex items-center gap-3">
                    <button onClick={resetData} disabled={!card}
                        className="flex-1 py-2.5 rounded-xl border border-red-200 text-red-500 font-medium text-sm hover:bg-red-50 flex items-center justify-center gap-2 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                        <Icon name="trash-2" size={14}/> {t.resetCard}
                    </button>
                    {/* Upload statement button */}
                    <button onClick={() => fileInputRef.current?.click()} disabled={scanning}
                        className="flex-1 py-2.5 rounded-xl border border-blue-200 text-blue-600 font-medium text-sm hover:bg-blue-50 flex items-center justify-center gap-2 transition-colors disabled:opacity-60">
                        {scanning
                            ? <><Icon name="loader" size={14} className="spin"/> {scanProgress.total > 1 ? t.scanningOf(scanProgress.done, scanProgress.total) : t.scanning}</>
                            : <><Icon name="upload" size={14}/> {t.uploadStatement}</>}
                    </button>
                    <input ref={fileInputRef} type="file" accept=".pdf" multiple className="hidden" onChange={handleFileChange}/>
                    <div className="text-xs text-slate-400 text-center hidden sm:block" style={{minWidth:'72px'}}>
                        {t.autoSave}<br/>{t.autoSaveLocal}
                    </div>
                </div>
            </div>

            {/* ── Bulk scan results modal ───────────────────────────── */}
            {scanResults && (
                <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4"
                    onClick={(e) => { if (e.target === e.currentTarget) handleScanClose(); }}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[85vh] flex flex-col fade-in">

                        {/* Modal header */}
                        <div className="flex items-center justify-between p-5 border-b border-slate-100">
                            <h2 className="font-bold text-slate-800 flex items-center gap-2">
                                <Icon name="sparkles" size={18} className="text-blue-500"/>
                                {t.bulkScanTitle(scanResults.length)}
                            </h2>
                            <button onClick={handleScanClose}
                                className="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100">
                                <Icon name="x" size={18}/>
                            </button>
                        </div>

                        {/* Modal body — one card per PDF */}
                        <div className="p-4 overflow-y-auto space-y-3">
                            {scanResults.map((result, idx) => {
                                const newCount = result.applied?.filter(a => a.was_new).length || 0;
                                const cardCfg  = result.card_id ? CARDS[result.card_id] : null;
                                return (
                                    <div key={idx} className="border border-slate-200 rounded-xl overflow-hidden">
                                        {/* File name bar */}
                                        <div className="bg-slate-50 px-3 py-2 flex items-center justify-between gap-2">
                                            <span className="text-xs text-slate-400 truncate flex items-center gap-1">
                                                <Icon name="upload" size={11}/> {result._filename}
                                            </span>
                                            {newCount > 0 && (
                                                <span className="text-xs font-semibold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full whitespace-nowrap flex-shrink-0">
                                                    +{newCount} {t.newlyApplied}
                                                </span>
                                            )}
                                        </div>

                                        <div className="p-3 space-y-2.5">
                                            {result.error === 'unidentified_card' ? (
                                                /* Card unknown but user found — show bind UI */
                                                <div className="space-y-2">
                                                    <div className="flex gap-2">
                                                        <div className="flex-1 bg-slate-50 rounded-lg p-2">
                                                            <div className="text-xs text-slate-400 mb-0.5">{t.detectedUser}</div>
                                                            <div className="text-sm font-semibold text-slate-700">{result.user?.name || result.cardholder || '—'}</div>
                                                        </div>
                                                        <div className="flex-1 bg-orange-50 rounded-lg p-2">
                                                            <div className="text-xs text-slate-400 mb-0.5">{t.accountLast4}</div>
                                                            <div className="text-sm font-semibold text-slate-700">{result.last4 || '—'}</div>
                                                        </div>
                                                    </div>
                                                    <div className="bg-orange-50 border border-orange-100 rounded-lg p-3 space-y-2">
                                                        <p className="text-xs text-orange-700">{t.bindAccountHint}</p>
                                                        <select value={bindSelections[idx] || ''}
                                                            onChange={e => setBindSelections(prev => ({...prev, [idx]: e.target.value}))}
                                                            className="w-full text-xs border border-slate-200 rounded-lg px-2 py-1.5 bg-white">
                                                            <option value="">{t.selectCardType}</option>
                                                            {ALL_CARD_IDS.map(cid => (
                                                                <option key={cid} value={cid}>{CARDS[cid]?.name[lang] || cid}</option>
                                                            ))}
                                                        </select>
                                                        <button onClick={() => bindAccountCard(idx)}
                                                            disabled={!bindSelections[idx]}
                                                            className="w-full py-1.5 text-xs font-medium rounded-lg bg-orange-500 text-white hover:bg-orange-600 disabled:opacity-40 transition-colors">
                                                            {t.bindCard}
                                                        </button>
                                                    </div>
                                                </div>
                                            ) : result.error ? (
                                                <div className="flex items-center gap-2 text-red-500 text-sm">
                                                    <Icon name="x-circle" size={14}/> {result.error}
                                                </div>
                                            ) : (
                                                <>
                                                    {/* Card + User */}
                                                    <div className="flex gap-2">
                                                        <div className="flex-1 bg-slate-50 rounded-lg p-2">
                                                            <div className="text-xs text-slate-400 mb-0.5">{t.detectedCard}</div>
                                                            <div className="text-sm font-semibold text-slate-700">
                                                                {cardCfg ? cardCfg.name[lang] : <span className="text-red-400 text-xs">{t.cardNotDetected}</span>}
                                                            </div>
                                                        </div>
                                                        <div className="flex-1 bg-slate-50 rounded-lg p-2">
                                                            <div className="text-xs text-slate-400 mb-0.5">{t.detectedUser}</div>
                                                            <div className={`text-sm font-semibold ${result.user ? 'text-slate-700' : 'text-orange-500'}`}>
                                                                {result.user ? result.user.name : (result.cardholder || '—')}
                                                            </div>
                                                        </div>
                                                    </div>

                                                    {/* Unmatched user — offer to create */}
                                                    {!result.user && result.card_id && result.cardholder && (
                                                        <div className="bg-orange-50 border border-orange-100 rounded-lg p-3 space-y-2">
                                                            <p className="text-xs text-orange-700 flex items-center gap-1">
                                                                <Icon name="info" size={12} className="flex-shrink-0"/>
                                                                {t.newUserHint}: <strong className="ml-0.5">{result.cardholder}</strong>
                                                            </p>
                                                            <button onClick={() => createUserAndApply(idx)}
                                                                className="w-full py-1.5 text-xs font-medium rounded-lg bg-orange-500 text-white hover:bg-orange-600 transition-colors flex items-center justify-center gap-1.5">
                                                                <Icon name="user-plus" size={12}/> {t.createUserAndApply}
                                                            </button>
                                                        </div>
                                                    )}

                                                    {/* Benefits */}
                                                    {result.applied && result.applied.length > 0 && (
                                                        <div className="space-y-1.5">
                                                            {result.applied.map((item, i) => {
                                                                const bCfg  = cardCfg?.benefits.find(b => b.id === item.benefit_id);
                                                                const bName = bCfg ? bCfg.name[lang] : item.benefit_id;
                                                                const monthStr = item.month != null
                                                                    ? `${t.monthNames[item.month]}${item.year ? ' ' + item.year : ''}`
                                                                    : (item.year ? String(item.year) : null);
                                                                return (
                                                                    <div key={i} className={`flex items-center justify-between rounded-lg px-2.5 py-1.5 text-xs ${
                                                                        item.was_new ? 'bg-emerald-50 text-emerald-800' : 'bg-slate-50 text-slate-500'
                                                                    }`}>
                                                                        <div className="flex items-center gap-1.5">
                                                                            <Icon name={item.was_new ? 'check-circle' : 'info'} size={12}
                                                                                className={item.was_new ? 'text-emerald-500' : 'text-slate-400'}/>
                                                                            <span>{bName}</span>
                                                                            {item.amount > 0 && <span className="text-slate-400">${item.amount.toFixed(2)}</span>}
                                                                            {monthStr && <span className="text-slate-400">· {monthStr}</span>}
                                                                        </div>
                                                                        <span className={`font-medium px-1.5 py-0.5 rounded-full text-[10px] flex-shrink-0 ml-2 ${
                                                                            item.was_new ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-500'
                                                                        }`}>
                                                                            {item.was_new ? t.newlyApplied : t.alreadyRecorded}
                                                                        </span>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    )}
                                                    {result.applied?.length === 0 && result.user && (
                                                        <p className="text-xs text-slate-400 text-center py-1">{t.noBenefitsFound}</p>
                                                    )}
                                                </>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {/* Modal footer */}
                        <div className="p-4 border-t border-slate-100">
                            {scanResults.some(r => r.applied?.some(a => a.was_new)) && (
                                <div className="text-xs text-emerald-600 text-center mb-2 font-medium">
                                    ✓ {t.scanSuccess(scanResults.reduce((sum, r) => sum + (r.applied?.filter(a => a.was_new).length || 0), 0))}
                                </div>
                            )}
                            <button onClick={handleScanClose}
                                className="w-full py-2.5 rounded-xl bg-slate-900 text-white font-medium text-sm hover:bg-slate-700 transition-colors">
                                {t.close}
                            </button>
                        </div>
                    </div>
                </div>
            )}

            {/* ── Add Card from URL modal ───────────────────────────── */}
            {addCardStep !== 'closed' && (
                <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4"
                    onClick={(e) => { if (e.target === e.currentTarget && addCardStep !== 'scraping') setAddCardStep('closed'); }}>
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-xl flex flex-col fade-in"
                        style={{maxHeight: '90vh'}}>

                        {/* URL input step */}
                        {(addCardStep === 'url' || addCardStep === 'scraping') && (
                            <>
                                <div className="flex items-center justify-between p-5 border-b border-slate-100">
                                    <h2 className="font-bold text-slate-800 flex items-center gap-2">
                                        <Icon name="link" size={16} className="text-blue-500"/>
                                        {t.addCustomCard}
                                    </h2>
                                    <button onClick={() => setAddCardStep('closed')} disabled={addCardStep === 'scraping'}
                                        className="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100 disabled:opacity-40">
                                        <Icon name="x" size={18}/>
                                    </button>
                                </div>
                                <div className="p-6 space-y-4">
                                    <p className="text-sm text-slate-500">
                                        {lang === 'zh'
                                            ? '输入信用卡介绍页的网址，系统将自动抓取福利信息，您可以在确认后保存。'
                                            : 'Enter a credit card review page URL. The app will scrape the benefits info for you to review before saving.'}
                                    </p>
                                    <input type="url" value={scrapeUrl}
                                        onChange={e => setScrapeUrl(e.target.value)}
                                        onKeyDown={e => { if (e.key === 'Enter' && addCardStep === 'url') handleScrapeCard(); }}
                                        placeholder={t.urlPlaceholder}
                                        disabled={addCardStep === 'scraping'}
                                        className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-400 disabled:bg-slate-50"/>
                                    {scrapeUrlError && (
                                        <div className="flex items-center gap-2 text-red-500 text-sm bg-red-50 rounded-xl p-3">
                                            <Icon name="x-circle" size={14}/> {scrapeUrlError}
                                        </div>
                                    )}
                                    <div className="flex gap-3">
                                        <button onClick={() => setAddCardStep('closed')} disabled={addCardStep === 'scraping'}
                                            className="flex-1 py-2.5 rounded-xl border border-slate-200 text-slate-600 text-sm hover:bg-slate-50 font-medium disabled:opacity-40 transition-colors">
                                            {t.close}
                                        </button>
                                        <button onClick={handleScrapeCard} disabled={addCardStep === 'scraping' || !scrapeUrl.trim()}
                                            className="flex-1 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 disabled:opacity-50 transition-colors flex items-center justify-center gap-2">
                                            {addCardStep === 'scraping'
                                                ? <><Icon name="loader" size={14} className="spin"/> {t.analyzingCard}</>
                                                : <><Icon name="sparkles" size={14}/> {t.analyzeCard}</>}
                                        </button>
                                    </div>
                                </div>
                            </>
                        )}

                        {/* Editing step */}
                        {addCardStep === 'editing' && cardDraft && (
                            <CardEditor
                                draft={cardDraft}
                                onChange={setCardDraft}
                                onSave={handleSaveCard}
                                onCancel={() => setAddCardStep('closed')}
                                lang={lang}
                                t={t}
                            />
                        )}
                    </div>
                </div>
            )}

        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
